<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Signum v2: Enhanced signal pulse through diamond with inner geometry -->
  <!-- Outer diamond frame -->
  <polygon points="32,2 62,32 32,62 2,32" fill="none" stroke="#1a1a2e" stroke-width="2"/>
  <!-- Corner tick marks on outer diamond -->
  <line x1="32" y1="2" x2="32" y2="8" stroke="#1a1a2e" stroke-width="1.5"/>
  <line x1="62" y1="32" x2="56" y2="32" stroke="#1a1a2e" stroke-width="1.5"/>
  <line x1="32" y1="62" x2="32" y2="56" stroke="#1a1a2e" stroke-width="1.5"/>
  <line x1="2" y1="32" x2="8" y2="32" stroke="#1a1a2e" stroke-width="1.5"/>
  <!-- Signal pulse wave (more complex waveform) -->
  <polyline points="6,32 16,32 19,32 22,22 25,40 28,16 32,48 35,20 38,38 41,28 44,32 48,32 58,32"
            fill="none" stroke="#1a1a2e" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Small flanking dots -->
  <circle cx="10" cy="32" r="1.2" fill="#1a1a2e"/>
  <circle cx="54" cy="32" r="1.2" fill="#1a1a2e"/>
</svg>
